<!DOCTYPE html>

<html class="light" lang="zh-TW"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "kakao-yellow": "#FFE600",
                    "outline-variant": "#cdc7aa",
                    "outline": "#7c775f",
                    "on-secondary-container": "#7a5353",
                    "secondary": "#7b5454",
                    "primary-container": "#ffe600",
                    "on-surface": "#1a1c1c",
                    "surface-variant": "#e2e2e2",
                    "secondary-container": "#fecbc9",
                    "kakao-brown": "#3C1E1E",
                    "background": "#f1f1f7",
                    "chat-bg": "#ABC1D1",
                    "on-error-container": "#93000a",
                    "bubble-user": "#FFE600",
                    "error-container": "#ffdad6",
                    "on-tertiary-fixed": "#002020",
                    "tertiary-fixed": "#00fbfc",
                    "on-secondary-fixed-variant": "#613d3d",
                    "surface-dim": "#dadada",
                    "on-secondary-fixed": "#2f1313",
                    "tertiary": "#006a6a",
                    "surface-container-highest": "#e2e2e2",
                    "secondary-fixed-dim": "#ecbab9",
                    "tertiary-fixed-dim": "#00dcdd",
                    "surface-container-high": "#e8e8e8",
                    "on-secondary": "#ffffff",
                    "on-surface-variant": "#4b4731",
                    "secondary-fixed": "#ffdad9",
                    "bubble-other": "#FFFFFF",
                    "on-tertiary": "#ffffff",
                    "inverse-surface": "#2f3131",
                    "text-primary": "#191919",
                    "on-background": "#1a1c1c",
                    "primary-fixed": "#fde400",
                    "surface": "#f9f9f9",
                    "on-error": "#ffffff",
                    "surface-tint": "#6a5f00",
                    "surface-bright": "#f9f9f9",
                    "primary-fixed-dim": "#dec800",
                    "text-secondary": "#666666",
                    "primary": "#6a5f00",
                    "on-primary-fixed": "#201c00",
                    "on-primary": "#ffffff",
                    "on-primary-container": "#726600",
                    "on-tertiary-container": "#007272",
                    "error": "#ba1a1a",
                    "surface-container-low": "#f3f3f3",
                    "inverse-on-surface": "#f1f1f1",
                    "tertiary-container": "#00feff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "10px",
                    "xl": "12px",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-side": "16px",
                    "bubble-padding": "10px 14px",
                    "unit": "4px",
                    "gutter": "12px",
                    "chat-gap": "8px",
                    "tab-bar-height": "64px"
            },
            "fontFamily": {
                    "headline-lg-mobile": ["Be Vietnam Pro"],
                    "headline-md": ["Be Vietnam Pro"],
                    "headline-lg": ["Be Vietnam Pro"],
                    "body-md": ["Be Vietnam Pro"],
                    "title-lg": ["Be Vietnam Pro"],
                    "chat-text": ["Be Vietnam Pro"],
                    "label-md": ["Be Vietnam Pro"],
                    "body-lg": ["Be Vietnam Pro"]
            },
            "fontSize": {
                    "headline-lg-mobile": ["22px", {"lineHeight": "28px", "fontWeight": "700"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "700"}],
                    "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "title-lg": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "chat-text": ["15px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                    "body-lg": ["16px", {"lineHeight": "22px", "fontWeight": "400"}]

          },
        },
      }

<style>
        body {
            background-color: #f1f1f7;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-toggle {
            appearance: none;
            width: 51px;
            height: 31px;
            background: #e9e9eb;
            border-radius: 31px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
            outline: none;
        }
        .ios-toggle:checked {
            background: #34c759;
        }
        .ios-toggle::before {
            content: '';
            position: absolute;
            width: 27px;
            height: 27px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }
        .ios-toggle:checked::before {
            transform: translateX(20px);
        }
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .ios-divider {
            height: 0.5px;
            background-color: #c6c6c8;
            margin-left: 16px;
        }
        .active-tap:active {
            background-color: #d1d1d6;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-text-primary overflow-x-hidden">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md w-full h-14 flex items-center px-4 justify-between transition-all">
<div class="flex items-center w-1/4">
<button class="flex items-center text-[#007AFF] active:opacity-30 transition-opacity">
<span class="material-symbols-outlined font-light text-[28px]">chevron_left</span>
<span class="font-body-lg text-[17px]">設定</span>
</button>
</div>
<div class="flex-1 text-center">
<h1 class="font-title-lg text-[17px] font-bold">通知</h1>
</div>
<div class="w-1/4"></div>
</header>
<main class="max-w-md mx-auto py-8 px-4 space-y-8 pb-20">
<!-- Section 1: Main Toggle -->
<section class="bg-white rounded-xl shadow-sm overflow-hidden">
<div class="flex items-center justify-between p-4 min-h-[44px]">
<span class="font-body-lg text-[17px]">允許通知</span>
<input checked="" class="ios-toggle" type="checkbox"/>
</div>
</section>
<!-- Section 2: Notification Styles -->
<section>
<h2 class="px-4 pb-2 font-label-md text-text-secondary uppercase text-[13px] tracking-wide">提示樣式</h2>
<div class="bg-white rounded-xl shadow-sm p-5 flex justify-between items-start gap-4">
<!-- Lock Screen -->
<div class="flex flex-col items-center flex-1 space-y-3 cursor-pointer group">
<div class="relative w-full aspect-[9/16] max-w-[70px] bg-gray-100 rounded-lg border border-gray-200 p-2 flex flex-col items-center overflow-hidden">
<div class="w-4 h-1 bg-gray-400 rounded-full mb-2 opacity-30"></div>
<div class="w-full h-4 bg-kakao-yellow/20 rounded-md border border-kakao-yellow/30"></div>
</div>
<span class="text-[12px] font-body-md">鎖定畫面</span>
<div class="w-5 h-5 rounded-full border border-gray-300 flex items-center justify-center bg-white group-hover:border-[#007AFF]">
<div class="w-3 h-3 rounded-full bg-[#007AFF]"></div>
</div>
</div>
<!-- Notification Center -->
<div class="flex flex-col items-center flex-1 space-y-3 cursor-pointer group">
<div class="relative w-full aspect-[9/16] max-w-[70px] bg-gray-100 rounded-lg border border-gray-200 p-2 flex flex-col items-start overflow-hidden">
<div class="w-full h-2 bg-gray-300 rounded mb-1 opacity-20"></div>
<div class="w-full h-4 bg-kakao-yellow/20 rounded-md border border-kakao-yellow/30"></div>
</div>
<span class="text-[12px] font-body-md text-center">通知中心</span>
<div class="w-5 h-5 rounded-full border border-[#007AFF] bg-[#007AFF] flex items-center justify-center">
<span class="material-symbols-outlined text-white text-[14px] font-bold">check</span>
</div>
</div>
<!-- Banners -->
<div class="flex flex-col items-center flex-1 space-y-3 cursor-pointer group">
<div class="relative w-full aspect-[9/16] max-w-[70px] bg-gray-100 rounded-lg border border-gray-200 p-2 flex flex-col items-center overflow-hidden">
<div class="w-full h-4 bg-kakao-yellow/20 rounded-md border border-kakao-yellow/30 -mt-1"></div>
</div>
<span class="text-[12px] font-body-md">橫幅</span>
<div class="w-5 h-5 rounded-full border border-[#007AFF] bg-[#007AFF] flex items-center justify-center">
<span class="material-symbols-outlined text-white text-[14px] font-bold">check</span>
</div>
</div>
</div>
<p class="px-4 pt-3 font-label-md text-text-secondary text-[13px]">
                橫幅樣式：暫時
            </p>
</section>
<!-- Section 3: Toggles -->
<section class="bg-white rounded-xl shadow-sm overflow-hidden">
<div class="flex items-center justify-between p-4 min-h-[44px] active-tap transition-colors cursor-pointer">
<span class="font-body-lg text-[17px]">聲音</span>
<input checked="" class="ios-toggle" type="checkbox"/>
</div>
<div class="ios-divider"></div>
<div class="flex items-center justify-between p-4 min-h-[44px] active-tap transition-colors cursor-pointer">
<span class="font-body-lg text-[17px]">標記</span>
<input checked="" class="ios-toggle" type="checkbox"/>
</div>
</section>
<!-- App Specific Section Placeholder -->
<section>
<h2 class="px-4 pb-2 font-label-md text-text-secondary uppercase text-[13px] tracking-wide">預覽</h2>
<div class="bg-white rounded-xl shadow-sm overflow-hidden">
<div class="flex items-center justify-between p-4 min-h-[44px] active-tap transition-colors cursor-pointer">
<div class="flex flex-col">
<span class="font-body-lg text-[17px]">顯示預覽</span>
</div>
<div class="flex items-center text-text-secondary">
<span class="text-[17px] mr-1">解鎖時</span>
<span class="material-symbols-outlined text-[20px] opacity-40">chevron_right</span>
</div>
</div>
</div>
<p class="px-4 pt-2 font-label-md text-text-secondary text-[13px]">
                預覽會出現在鎖定畫面或通知中心。
            </p>
</section>
<!-- Notification Grouping -->
<section class="bg-white rounded-xl shadow-sm overflow-hidden">
<div class="flex items-center justify-between p-4 min-h-[44px] active-tap transition-colors cursor-pointer">
<span class="font-body-lg text-[17px]">通知分組</span>
<div class="flex items-center text-text-secondary">
<span class="text-[17px] mr-1">自動</span>
<span class="material-symbols-outlined text-[20px] opacity-40">chevron_right</span>
</div>
</div>
</section>
</main>
<!-- Bottom Placeholder for OS feeling -->
<div class="fixed bottom-0 left-0 right-0 h-8 bg-gradient-to-t from-background to-transparent pointer-events-none safe-bottom"></div>
<script>
        // Simple haptic feedback simulation on interactions
        document.querySelectorAll('.active-tap, .ios-toggle').forEach(el => {
            el.addEventListener('touchstart', () => {
                // Potential placeholder for Web Vibrate API if supported
                if ("vibrate" in navigator) {
                    // navigator.vibrate(5); 
                }
            });
        });

        // Ensure header transitions on scroll
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 10) {
                header.classList.add('border-b', 'border-gray-200');
            } else {
                header.classList.remove('border-b', 'border-gray-200');
            }
        });
    </script>
</body></html>
