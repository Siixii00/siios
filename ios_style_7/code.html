<!DOCTYPE html>

<html class="light" lang="zh-Hant"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            background-color: #f2f2f7; /* iOS System Gray 6 */
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .active-state:active {
            background-color: #d1d1d6 !important;
        }
        /* Custom checkmark color for iOS feel */
        .text-ios-blue {
            color: #007aff;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "kakao-yellow": "#FFE600",
                        "outline-variant": "#cdc7aa",
                        "outline": "#7c775f",
                        "on-secondary-container": "#7a5353",
                        "secondary": "#7b5454",
                        "primary-container": "#ffe600",
                        "on-surface": "#1a1c1c",
                        "surface-variant": "#e2e2e2",
                        "secondary-container": "#fecbc9",
                        "kakao-brown": "#3C1E1E",
                        "background": "#f2f2f7",
                        "chat-bg": "#ABC1D1",
                        "on-error-container": "#93000a",
                        "bubble-user": "#FFE600",
                        "error-container": "#ffdad6",
                        "surface-dim": "#dadada",
                        "tertiary": "#006a6a",
                        "surface-container-highest": "#e2e2e2",
                        "surface-container-high": "#e8e8e8",
                        "on-surface-variant": "#4b4731",
                        "bubble-other": "#FFFFFF",
                        "surface": "#f9f9f9",
                        "text-primary": "#191919",
                        "text-secondary": "#8e8e93",
                        "primary": "#6a5f00",
                        "surface-container-low": "#f3f3f3",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#eeeeee"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "ios": "10px"
                    },
                    "spacing": {
                        "margin-side": "16px",
                        "unit": "4px",
                        "gutter": "12px",
                        "tab-bar-height": "64px"
                    },
                    "fontFamily": {
                        "headline-md": ["Be Vietnam Pro"],
                        "body-md": ["Be Vietnam Pro"],
                        "title-lg": ["Be Vietnam Pro"],
                        "label-md": ["Be Vietnam Pro"],
                        "body-lg": ["Be Vietnam Pro"]
                    },
                    "fontSize": {
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "700"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "title-lg": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "body-lg": ["17px", {"lineHeight": "22px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-lg">
<!-- Top Navigation Bar -->
<header class="fixed top-0 left-0 right-0 z-50 bg-surface/80 ios-blur h-14 flex items-center px-margin-side justify-between border-b border-gray-200">
<div class="flex items-center w-1/3">
<button class="flex items-center text-[#007aff] transition-opacity active:opacity-30" onclick="history.back()">
<span class="material-symbols-outlined text-[24px]">chevron_left</span>
<span class="font-body-lg text-body-lg ml-[-4px]">設定</span>
</button>
</div>
<div class="w-1/3 text-center">
<h1 class="font-title-lg text-title-lg text-text-primary">語言</h1>
</div>
<div class="w-1/3 flex justify-end">
<!-- Placeholder for balance -->
</div>
</header>
<!-- Main Content Area -->
<main class="pt-20 pb-10 px-margin-side">
<!-- Grouped List Container -->
<div class="bg-white rounded-ios overflow-hidden shadow-sm">
<!-- Language Option: Traditional Chinese -->
<div class="active-state flex items-center justify-between px-4 py-3 cursor-pointer transition-colors border-b border-gray-100 last:border-b-0" onclick="selectLanguage('zh-tw')">
<span class="text-text-primary font-body-lg">繁體中文</span>
<div class="check-icon opacity-100" id="check-zh-tw">
<span class="material-symbols-outlined text-ios-blue text-[22px]">check</span>
</div>
</div>
<!-- Language Option: Simplified Chinese -->
<div class="active-state flex items-center justify-between px-4 py-3 cursor-pointer transition-colors border-b border-gray-100 last:border-b-0" onclick="selectLanguage('zh-cn')">
<span class="text-text-primary font-body-lg">簡體中文</span>
<div class="check-icon opacity-0" id="check-zh-cn">
<span class="material-symbols-outlined text-ios-blue text-[22px]">check</span>
</div>
</div>
</div>
<!-- Footer Text -->
<footer class="mt-2 px-4">
<p class="text-text-secondary text-[13px] leading-relaxed">
                選擇您偏好的語言介面。
            </p>
</footer>
<!-- Visual Accent: Bottom Bar Indicator (iOS style) -->
<div class="fixed bottom-1 left-1/2 -translate-x-1/2 w-32 h-1 bg-black/20 rounded-full opacity-50 pointer-events-none"></div>
</main>
<!-- Bottom Navigation Bar (Suppressed based on "Task-Focused" rule but technically part of shell, though hidden here for focus) -->
<!-- We omit the nav shell because this is a sub-page with a "Back" button, prioritizing focus as per guidelines -->
<script>
        /**
         * Simple interaction to toggle the blue checkmark in iOS style.
         */
        function selectLanguage(langCode) {
            // Hide all checkmarks
            document.querySelectorAll('.check-icon').forEach(icon => {
                icon.classList.replace('opacity-100', 'opacity-0');
            });

            // Show selected checkmark
            const activeIcon = document.getElementById(`check-${langCode}`);
            if (activeIcon) {
                activeIcon.classList.replace('opacity-0', 'opacity-100');
            }

            // Haptic feedback simulation
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(5);
            }
        }
    </script>
</body></html>
