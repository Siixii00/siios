<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#007AFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>iOS Classic AI</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/ios.css">
    <link rel="stylesheet" href="css/kakao.css">
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "ios-blue": "#007AFF",
                        "ios-bg": "#F2F2F7",
                        "ios-surface": "#FFFFFF",
                        "ios-text": "#000000",
                        "ios-muted": "#8E8E93",
                        "ios-accent": "#34C759",
                        "ios-border": "#C6C6C8",
                        "kakao-yellow": "#FFE600",
                        "kakao-brown": "#3C1E1E",
                        "kakao-blue": "#ABC1D1",
                    },
                    fontFamily: {
                        "ios-display": ["-apple-system", "BlinkMacSystemFont", "SF Pro Display", "sans-serif"],
                        "ios-text": ["-apple-system", "BlinkMacSystemFont", "SF Pro Text", "sans-serif"],
                        "kakao": ["Be Vietnam Pro", "sans-serif"],
                    },
                    borderRadius: {
                        "ios-group": "10px",
                        "ios-bubble": "18px",
                    },
                    spacing: {
                        "safe-top": "env(safe-area-inset-top)",
                        "safe-bottom": "env(safe-area-inset-bottom)",
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-ios-bg text-ios-text overflow-hidden">
    <div id="app"></div>
    <div id="toast-container" class="fixed top-20 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2"></div>
    
    <script type="module" src="js/app.js"></script>
</body>
</html>
