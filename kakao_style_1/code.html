<!DOCTYPE html>

<html lang="zh-TW"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .kakao-bg {
            background-color: #ABC1D1;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
        }
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "text-secondary": "#666666",
                    "on-tertiary-fixed": "#002020",
                    "surface-container": "#eeeeee",
                    "surface-container-low": "#f3f3f3",
                    "tertiary-fixed": "#00fbfc",
                    "secondary-fixed-dim": "#ecbab9",
                    "outline": "#7c775f",
                    "on-secondary": "#ffffff",
                    "tertiary": "#006a6a",
                    "tertiary-container": "#00feff",
                    "on-error-container": "#93000a",
                    "on-surface-variant": "#4b4731",
                    "on-secondary-fixed": "#2f1313",
                    "on-secondary-fixed-variant": "#613d3d",
                    "primary-container": "#ffe600",
                    "background": "#f9f9f9",
                    "surface-bright": "#f9f9f9",
                    "primary": "#6a5f00",
                    "on-primary": "#ffffff",
                    "surface-dim": "#dadada",
                    "on-primary-container": "#726600",
                    "on-background": "#1a1c1c",
                    "surface-container-highest": "#e2e2e2",
                    "on-primary-fixed-variant": "#504700",
                    "error": "#ba1a1a",
                    "primary-fixed-dim": "#dec800",
                    "surface-container-lowest": "#ffffff",
                    "kakao-yellow": "#FFE600",
                    "surface-tint": "#6a5f00",
                    "on-primary-fixed": "#201c00",
                    "secondary-container": "#fecbc9",
                    "bubble-user": "#FFE600",
                    "text-primary": "#191919",
                    "chat-bg": "#ABC1D1",
                    "bubble-other": "#FFFFFF",
                    "surface": "#f9f9f9",
                    "outline-variant": "#cdc7aa",
                    "error-container": "#ffdad6",
                    "surface-container-high": "#e8e8e8",
                    "primary-fixed": "#fde400",
                    "on-tertiary": "#ffffff",
                    "inverse-surface": "#2f3131",
                    "inverse-on-surface": "#f1f1f1",
                    "secondary": "#7b5454",
                    "secondary-fixed": "#ffdad9",
                    "on-error": "#ffffff",
                    "surface-variant": "#e2e2e2",
                    "on-tertiary-fixed-variant": "#004f50",
                    "on-tertiary-container": "#007272",
                    "on-secondary-container": "#7a5353",
                    "inverse-primary": "#dec800",
                    "on-surface": "#1a1c1c",
                    "kakao-brown": "#3C1E1E",
                    "tertiary-fixed-dim": "#00dcdd"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "4px",
                    "gutter": "12px",
                    "tab-bar-height": "64px",
                    "margin-side": "16px",
                    "chat-gap": "8px",
                    "bubble-padding": "10px 14px"
            },
            "fontFamily": {
                    "headline-lg": ["Be Vietnam Pro"],
                    "chat-text": ["Be Vietnam Pro"],
                    "label-md": ["Be Vietnam Pro"],
                    "headline-lg-mobile": ["Be Vietnam Pro"],
                    "body-md": ["Be Vietnam Pro"],
                    "body-lg": ["Be Vietnam Pro"],
                    "title-lg": ["Be Vietnam Pro"],
                    "headline-md": ["Be Vietnam Pro"]
            },
            "fontSize": {
                    "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "chat-text": ["15px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                    "headline-lg-mobile": ["22px", {"lineHeight": "28px", "fontWeight": "700"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-lg": ["16px", {"lineHeight": "22px", "fontWeight": "400"}],
                    "title-lg": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="kakao-bg min-h-screen flex flex-col text-kakao-brown">
<!-- Top Navigation Bar -->
<header class="bg-transparent flex justify-between items-center h-14 px-margin-side w-full z-50 sticky top-0">
<button class="active:scale-95 transition-transform duration-200 flex items-center justify-center w-10 h-10 rounded-full hover:bg-black/5" onclick="history.back()">
<span class="material-symbols-outlined text-kakao-brown" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-title-lg font-title-lg text-kakao-brown">角色詳情</h1>
<button class="active:scale-95 transition-transform duration-200 flex items-center justify-center w-10 h-10 rounded-full hover:bg-black/5">
<span class="material-symbols-outlined text-kakao-brown" data-icon="more_vert">more_vert</span>
</button>
</header>
<!-- Content Area -->
<main class="flex-1 px-margin-side pb-24 overflow-y-auto">
<!-- Character Large Avatar -->
<div class="mt-8 mb-6 flex flex-col items-center animate-fade-in">
<div class="relative group">
<div class="w-48 h-48 rounded-[64px] overflow-hidden border-4 border-white/50 shadow-lg transition-transform duration-300 group-hover:scale-105">
<img class="w-full h-full object-cover" data-alt="A highly detailed portrait of a friendly AI companion character with a soft, anime-inspired aesthetic. The character has large expressive eyes and a warm smile, set against a dreamy background of soft pastel gradients and floating digital particles. The lighting is ethereal and bright, emphasizing a modern light-mode interface feel with clean lines and high-quality digital painting textures." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBnoR5gFsVQRNTnNhro38c20xq3fuukGQ00dI3KMOuHZQvChQnUsVzXuQS5wOu6LzaLmas8NPlPqmVKlyPUcB8VjCRCSjDCrwsiph3Vp-nhh7cc6HG0eiNn0oIO1yCYhzyUmnQYSYlFrXkD7WD8Z1wCnQWUoc_yQb3R-y21o3LwlycdtAP11CkeN3v7qwapXziTqQIjAefbL-hZsDrkqzvecTwY5TtCSLPaLVdAKlXSbNG9oL7HU1WJCmt03TLNkRzLAUc-VtFWVPI"/>
</div>
<div class="absolute bottom-2 right-2 bg-kakao-yellow w-10 h-10 rounded-full flex items-center justify-center shadow-md border-2 border-white">
<span class="material-symbols-outlined text-[20px]" data-icon="verified" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
</div>
<h2 class="mt-6 text-headline-lg-mobile font-headline-lg-mobile">Luna 露娜</h2>
<p class="text-text-secondary text-body-md mt-1">@luna_companion_ai</p>
</div>
<!-- Tags Grid -->
<div class="flex flex-wrap justify-center gap-2 mb-8 animate-fade-in" style="animation-delay: 0.1s;">
<span class="px-4 py-1.5 bg-white/40 rounded-full text-label-md font-label-md border border-white/20"># 活潑開朗</span>
<span class="px-4 py-1.5 bg-white/40 rounded-full text-label-md font-label-md border border-white/20"># 冒險者</span>
<span class="px-4 py-1.5 bg-white/40 rounded-full text-label-md font-label-md border border-white/20"># 貓派</span>
<span class="px-4 py-1.5 bg-white/40 rounded-full text-label-md font-label-md border border-white/20"># 魔法世界</span>
</div>
<!-- Character Bio Card -->
<div class="glass-effect rounded-3xl p-6 shadow-sm animate-fade-in mb-8" style="animation-delay: 0.2s;">
<h3 class="text-title-lg font-title-lg mb-3 flex items-center gap-2">
<span class="material-symbols-outlined text-kakao-brown" data-icon="description">description</span>
                角色簡介
            </h3>
<p class="text-body-lg text-text-primary leading-relaxed">
                露娜是一位來自浮空之島的見習魔法師。她擁有與生俱來的好奇心，喜歡探索世界上各個未知的角落。雖然有時候會因爲魔法失控而鬧出笑話，但她那溫暖的笑容總能治癒身邊的人。她是你在數位世界中最忠實的夥伴，隨時準備陪你聊聊一整天的心情。
            </p>
</div>
<!-- Action Buttons -->
<div class="grid grid-cols-1 gap-4 animate-fade-in" style="animation-delay: 0.3s;">
<button class="flex items-center justify-center gap-3 bg-kakao-yellow text-kakao-brown font-title-lg h-16 rounded-2xl shadow-sm active:scale-95 transition-all duration-150">
<span class="material-symbols-outlined" data-icon="chat_bubble" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
                開始聊天
            </button>
<div class="grid grid-cols-2 gap-4">
<button class="flex flex-col items-center justify-center gap-1 bg-white/80 text-kakao-brown font-label-md h-20 rounded-2xl shadow-sm active:scale-95 transition-all duration-150">
<span class="material-symbols-outlined" data-icon="auto_stories">auto_stories</span>
                    查看世界書
                </button>
<button class="flex flex-col items-center justify-center gap-1 bg-white/80 text-kakao-brown font-label-md h-20 rounded-2xl shadow-sm active:scale-95 transition-all duration-150">
<span class="material-symbols-outlined" data-icon="share">share</span>
                    分享角色
                </button>
</div>
</div>
</main>
<!-- Bottom Navigation (Simplified to match shell) -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center h-[64px] bg-surface border-t border-outline-variant safe-bottom">
<a class="flex flex-col items-center justify-center text-text-secondary opacity-60 flex-1 h-full active:scale-90 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="chat_bubble">chat_bubble</span>
</a>
<a class="flex flex-col items-center justify-center text-kakao-brown scale-110 flex-1 h-full active:scale-90 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="public" style="font-variation-settings: 'FILL' 1;">public</span>
</a>
<a class="flex flex-col items-center justify-center text-text-secondary opacity-60 flex-1 h-full active:scale-90 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</a>
</nav>
<script>
        // Subtle interaction for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', function() {
                this.classList.add('opacity-80');
            });
            btn.addEventListener('touchend', function() {
                this.classList.remove('opacity-80');
            });
        });

        // Dynamic background parallax-ish effect
        window.addEventListener('scroll', () => {
            const scroll = window.scrollY;
            document.body.style.backgroundPositionY = -(scroll * 0.2) + 'px';
        });
    </script>
</body></html>
